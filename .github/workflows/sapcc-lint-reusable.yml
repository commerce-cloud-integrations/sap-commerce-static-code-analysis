name: sapcc-lint reusable

on:
  workflow_call:
    inputs:
      version:
        description: Release tag to download, for example v0.1.1.
        required: true
        type: string
      repo_path:
        description: Repository path to scan inside the caller workspace.
        required: false
        default: .
        type: string
      config_path:
        description: Optional path to the analyzer config file inside the caller workspace.
        required: false
        default: ""
        type: string
      upload_sarif:
        description: Upload SARIF to GitHub code scanning.
        required: false
        default: true
        type: boolean
      pull_request_changed_files_only:
        description: On pull requests, filter findings, artifacts, and gating to changed files while keeping full-repository analysis context.
        required: false
        default: true
        type: boolean
      html_report:
        description: Generate an HTML report and upload it as a workflow artifact.
        required: false
        default: false
        type: boolean
      csv_report:
        description: Generate a CSV report and upload it as a workflow artifact.
        required: false
        default: false
        type: boolean
      reviewdog_comments:
        description: Post reviewdog pull request comments for findings on changed lines.
        required: false
        default: true
        type: boolean
      html_output_path:
        description: HTML output path inside the caller workspace.
        required: false
        default: build/reports/sapcc-lint.html
        type: string
      csv_output_path:
        description: CSV output path inside the caller workspace.
        required: false
        default: build/reports/sapcc-lint.csv
        type: string
      sarif_output_path:
        description: SARIF output path inside the caller workspace.
        required: false
        default: build/reports/sapcc-lint.sarif
        type: string

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  analyze:
    name: sap-cc-lint scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download analyzer release bundle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release download "${{ inputs.version }}" \
            --repo "commerce-cloud-integrations/sap-commerce-static-code-analysis" \
            --pattern "sap-cc-static-code-analysis-*.zip" \
            --dir "$RUNNER_TEMP/sapcc-lint-release"

      - name: Unpack analyzer release bundle
        id: unpack
        shell: bash
        run: |
          zip_path="$(find "$RUNNER_TEMP/sapcc-lint-release" -type f -name 'sap-cc-static-code-analysis-*.zip' -print -quit)"
          test -n "$zip_path"
          unzip -q "$zip_path" -d "$RUNNER_TEMP/sapcc-lint-dist"
          binary_path="$(find "$RUNNER_TEMP/sapcc-lint-dist" -type f -path '*/bin/sap-cc-static-code-analysis' -print -quit)"
          test -n "$binary_path"
          chmod +x "$binary_path"
          echo "binary_path=${binary_path}" >> "$GITHUB_OUTPUT"

      - name: Collect changed pull request files
        id: changed_files
        if: ${{ github.event_name == 'pull_request' && inputs.pull_request_changed_files_only }}
        shell: bash
        run: |
          report_paths_file="$RUNNER_TEMP/sapcc-lint-changed-files.txt"
          if git rev-parse --verify HEAD^1 >/dev/null 2>&1 && git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            git diff --name-only --diff-filter=ACMR HEAD^1 HEAD^2 > "$report_paths_file"
          else
            echo "::warning::Could not determine pull request merge parents; falling back to full-repository reporting."
            : > "$report_paths_file"
          fi
          if [[ -s "$report_paths_file" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "path_file=$report_paths_file" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run sapcc-lint
        id: sapcc_lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          args=(
            scan
            --repo "${{ inputs.repo_path }}"
            --format console
          )
          if [[ -n "${{ inputs.config_path }}" ]]; then
            args+=(--config "${{ inputs.config_path }}")
          fi
          if [[ "${{ steps.changed_files.outputs.enabled }}" == "true" ]]; then
            args+=(--report-paths-file "${{ steps.changed_files.outputs.path_file }}")
          fi
          if [[ "${{ inputs.upload_sarif }}" == "true" ]]; then
            args+=(--format sarif --sarif-out "${{ inputs.sarif_output_path }}")
          fi
          if [[ "${{ inputs.html_report }}" == "true" ]]; then
            args+=(--format html --html-out "${{ inputs.html_output_path }}")
          fi
          if [[ "${{ inputs.csv_report }}" == "true" ]]; then
            args+=(--format csv --csv-out "${{ inputs.csv_output_path }}")
          fi
          if [[ "${{ inputs.reviewdog_comments }}" == "true" ]]; then
            args+=(--format rdjsonl --rdjsonl-out "$RUNNER_TEMP/sapcc-lint-reviewdog.rdjsonl")
          fi
          "${{ steps.unpack.outputs.binary_path }}" "${args[@]}"
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Detect analyzer output files
        id: output_files
        if: always()
        shell: bash
        run: |
          if [[ -f "${{ inputs.sarif_output_path }}" ]]; then
            echo "sarif_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "sarif_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f "${{ inputs.html_output_path }}" ]]; then
            echo "html_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "html_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f "${{ inputs.csv_output_path }}" ]]; then
            echo "csv_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "csv_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f "$RUNNER_TEMP/sapcc-lint-reviewdog.rdjsonl" ]]; then
            echo "rdjsonl_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "rdjsonl_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f "${{ inputs.sarif_output_path }}" ]]; then
            sarif_result_count="$(python3 -c 'import json, sys; data = json.load(open(sys.argv[1], encoding="utf-8")); print(sum(len(run.get("results", [])) for run in data.get("runs", [])))' "${{ inputs.sarif_output_path }}")"
            echo "sarif_result_count=${sarif_result_count}" >> "$GITHUB_OUTPUT"
            if (( sarif_result_count <= 25000 )); then
              echo "sarif_uploadable=true" >> "$GITHUB_OUTPUT"
            else
              echo "sarif_uploadable=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "sarif_result_count=0" >> "$GITHUB_OUTPUT"
            echo "sarif_uploadable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF results
        if: ${{ always() && inputs.upload_sarif && steps.output_files.outputs.sarif_exists == 'true' && steps.output_files.outputs.sarif_uploadable == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ inputs.sarif_output_path }}

      - name: Warn when SARIF upload is skipped
        if: ${{ always() && inputs.upload_sarif && steps.output_files.outputs.sarif_exists == 'true' && steps.output_files.outputs.sarif_uploadable != 'true' }}
        shell: bash
        run: |
          echo "::warning::Skipping SARIF upload because the report contains ${{ steps.output_files.outputs.sarif_result_count }} results and GitHub code scanning rejects runs above 25000 results. HTML/CSV artifacts and analyzer exit-code enforcement still apply."

      - name: Upload HTML report artifact
        if: ${{ always() && inputs.html_report && steps.output_files.outputs.html_exists == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: sapcc-lint-html-report
          path: ${{ inputs.html_output_path }}

      - name: Upload CSV report artifact
        if: ${{ always() && inputs.csv_report && steps.output_files.outputs.csv_exists == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: sapcc-lint-csv-report
          path: ${{ inputs.csv_output_path }}

      - name: Set up reviewdog
        if: ${{ always() && github.event_name == 'pull_request' && inputs.reviewdog_comments && steps.output_files.outputs.rdjsonl_exists == 'true' }}
        uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252

      - name: Run reviewdog
        id: reviewdog
        if: ${{ always() && github.event_name == 'pull_request' && inputs.reviewdog_comments && steps.output_files.outputs.rdjsonl_exists == 'true' }}
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          reviewdog \
            -f=rdjsonl \
            -name="sap-cc-lint" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-level=none \
            -level=info \
            < "$RUNNER_TEMP/sapcc-lint-reviewdog.rdjsonl"

      - name: Warn if reviewdog could not post comments
        if: ${{ always() && steps.reviewdog.outcome == 'failure' }}
        shell: bash
        run: |
          echo "::warning::reviewdog could not post pull request review comments. Check pull-requests: write permissions; SARIF upload and analyzer gating still apply."

      - name: Enforce analyzer exit code
        if: always()
        shell: bash
        run: |
          exit_code="${{ steps.sapcc_lint.outputs.exit_code }}"
          if [[ -z "${exit_code}" ]]; then
            exit_code=2
          fi
          exit "${exit_code}"
