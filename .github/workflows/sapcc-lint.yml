name: sapcc-lint

on:
  pull_request:
    paths:
      - "**/*-items.xml"
      - ".sapcc-lint.yml"
      - "build.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "src/**"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  analyze:
    name: sap-cc-lint repository scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build analyzer
        run: ./gradlew test installDist

      - name: Collect changed pull request files
        id: changed_files
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          report_paths_file="$RUNNER_TEMP/sapcc-lint-changed-files.txt"
          if git rev-parse --verify HEAD^1 >/dev/null 2>&1 && git rev-parse --verify HEAD^2 >/dev/null 2>&1; then
            git diff --name-only --diff-filter=ACMR HEAD^1 HEAD^2 > "$report_paths_file"
          else
            echo "::warning::Could not determine pull request merge parents; falling back to full-repository reporting."
            : > "$report_paths_file"
          fi
          if [[ -s "$report_paths_file" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "path_file=$report_paths_file" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run sapcc-lint
        id: sapcc_lint
        continue-on-error: true
        run: |
          set +e
          args=(
            scan
            --repo .
            --format console
            --format html
            --html-out build/reports/sapcc-lint.html
            --format csv
            --csv-out build/reports/sapcc-lint.csv
            --format sarif
            --sarif-out build/reports/sapcc-lint.sarif
            --format rdjsonl
            --rdjsonl-out build/reports/sapcc-lint.rdjsonl
          )
          if [[ "${{ steps.changed_files.outputs.enabled }}" == "true" ]]; then
            args+=(--report-paths-file "${{ steps.changed_files.outputs.path_file }}")
          fi
          ./build/install/sap-cc-static-code-analysis/bin/sap-cc-static-code-analysis "${args[@]}"
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Detect analyzer output files
        id: output_files
        if: always()
        shell: bash
        run: |
          if [[ -f build/reports/sapcc-lint.sarif ]]; then
            echo "sarif_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "sarif_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f build/reports/sapcc-lint.html ]]; then
            echo "html_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "html_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f build/reports/sapcc-lint.csv ]]; then
            echo "csv_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "csv_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f build/reports/sapcc-lint.rdjsonl ]]; then
            echo "rdjsonl_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "rdjsonl_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f build/reports/sapcc-lint.sarif ]]; then
            sarif_result_count="$(python3 -c 'import json, sys; data = json.load(open(sys.argv[1], encoding="utf-8")); print(sum(len(run.get("results", [])) for run in data.get("runs", [])))' build/reports/sapcc-lint.sarif)"
            echo "sarif_result_count=${sarif_result_count}" >> "$GITHUB_OUTPUT"
            if (( sarif_result_count <= 25000 )); then
              echo "sarif_uploadable=true" >> "$GITHUB_OUTPUT"
            else
              echo "sarif_uploadable=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "sarif_result_count=0" >> "$GITHUB_OUTPUT"
            echo "sarif_uploadable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF results
        if: ${{ always() && steps.output_files.outputs.sarif_exists == 'true' && steps.output_files.outputs.sarif_uploadable == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/sapcc-lint.sarif

      - name: Warn when SARIF upload is skipped
        if: ${{ always() && steps.output_files.outputs.sarif_exists == 'true' && steps.output_files.outputs.sarif_uploadable != 'true' }}
        shell: bash
        run: |
          echo "::warning::Skipping SARIF upload because the report contains ${{ steps.output_files.outputs.sarif_result_count }} results and GitHub code scanning rejects runs above 25000 results. HTML/CSV artifacts and analyzer exit-code enforcement still apply."

      - name: Upload HTML report artifact
        if: ${{ always() && steps.output_files.outputs.html_exists == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: sapcc-lint-html-report
          path: build/reports/sapcc-lint.html

      - name: Upload CSV report artifact
        if: ${{ always() && steps.output_files.outputs.csv_exists == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: sapcc-lint-csv-report
          path: build/reports/sapcc-lint.csv

      - name: Set up reviewdog
        if: ${{ always() && github.event_name == 'pull_request' && steps.output_files.outputs.rdjsonl_exists == 'true' }}
        uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252

      - name: Run reviewdog
        id: reviewdog
        if: ${{ always() && github.event_name == 'pull_request' && steps.output_files.outputs.rdjsonl_exists == 'true' }}
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          reviewdog \
            -f=rdjsonl \
            -name="sap-cc-lint" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-level=none \
            -level=info \
            < build/reports/sapcc-lint.rdjsonl

      - name: Warn if reviewdog could not post comments
        if: ${{ always() && steps.reviewdog.outcome == 'failure' }}
        run: |
          echo "::warning::reviewdog could not post pull request review comments. Check pull-requests: write permissions; SARIF upload and analyzer gating still apply."

      - name: Enforce analyzer exit code
        if: always()
        run: |
          exit_code="${{ steps.sapcc_lint.outputs.exit_code }}"
          if [[ -z "${exit_code}" ]]; then
            exit_code=2
          fi
          exit "${exit_code}"
