name: sapcc-lint

on:
  pull_request:
    paths:
      - "**/*-items.xml"
      - ".sapcc-lint.yml"
      - "build.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "src/**"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build analyzer
        run: ./gradlew test installDist

      - name: Run sapcc-lint
        id: sapcc_lint
        continue-on-error: true
        run: |
          set +e
          ./build/install/sap-cc-static-code-analysis/bin/sap-cc-static-code-analysis \
            scan \
            --repo . \
            --format console \
            --format html \
            --html-out build/reports/sapcc-lint.html \
            --format csv \
            --csv-out build/reports/sapcc-lint.csv \
            --format sarif \
            --sarif-out build/reports/sapcc-lint.sarif \
            --format rdjsonl \
            --rdjsonl-out build/reports/sapcc-lint.rdjsonl
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Upload SARIF results
        if: ${{ always() && hashFiles('build/reports/sapcc-lint.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/sapcc-lint.sarif

      - name: Upload HTML report artifact
        if: ${{ always() && hashFiles('build/reports/sapcc-lint.html') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sapcc-lint-html-report
          path: build/reports/sapcc-lint.html

      - name: Upload CSV report artifact
        if: ${{ always() && hashFiles('build/reports/sapcc-lint.csv') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sapcc-lint-csv-report
          path: build/reports/sapcc-lint.csv

      - name: Set up reviewdog
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('build/reports/sapcc-lint.rdjsonl') != '' }}
        uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252

      - name: Run reviewdog
        id: reviewdog
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('build/reports/sapcc-lint.rdjsonl') != '' }}
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          reviewdog \
            -f=rdjsonl \
            -name="sapcc-lint" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -fail-level=none \
            -level=info \
            < build/reports/sapcc-lint.rdjsonl

      - name: Warn if reviewdog could not post comments
        if: ${{ always() && steps.reviewdog.outcome == 'failure' }}
        run: |
          echo "::warning::reviewdog could not post pull request review comments. Check pull-requests: write permissions; SARIF upload and analyzer gating still apply."

      - name: Enforce analyzer exit code
        if: always()
        run: |
          exit_code="${{ steps.sapcc_lint.outputs.exit_code }}"
          if [[ -z "${exit_code}" ]]; then
            exit_code=2
          fi
          exit "${exit_code}"
